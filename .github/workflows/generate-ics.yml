name: Generate IPL ICS

on:
  push:
    branches:
      - main
    paths:
      - 'data/**.json'
      - 'scripts/generate_ics.py'
      - '.github/workflows/generate-ics.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate ICS file
        run: python3 scripts/generate_ics.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/ipl.ics
          if git diff --staged --quiet; then
            echo "No changes to ICS file."
          else
            git commit -m "chore: auto-regenerate ipl.ics"
            git push
          fi